name: Build-Action  # When pushing to any branch then run this action
# Env variable
env:
  DESCRIPTION: "Borg image to use as borg backup repository via ssh"

on:
  workflow_dispatch:
  push:
    branches:
    - 'main'
  schedule:
    - cron: "0 0 1 * *"

jobs: # job name 
  build-deploy:
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)    
    steps:
      - name: Check out my repo
        uses: actions/checkout@v6
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: 'linux/arm/v7,linux/arm64,linux/amd64'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: 'linux/arm/v7,linux/arm64,linux/amd64'
      - name: ghcr login
        uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: dockerhub login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            BORG_VERSION=${{ vars.BORG_VERSION }}
            ALPINE_VERSION=${{ vars.ALPINE_VERSION }}
          tags: |
            ${{ vars.REPO_NAME }}:latest
            ${{ vars.REPO_NAME }}:${{ vars.BORG_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ vars.BORG_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          platforms: |
            linux/arm/v7
            linux/arm64
            linux/amd64
          labels: |
            MAINTAINER="Marcello Percoco <114474556+MarcelloPercoco@users.noreply.github.com>"
            org.opencontainers.image.source=https://github.com/MarcelloPercoco/borg-backup
            org.opencontainers.image.description=${{ env.DESCRIPTION }}
          push: true
          sbom: true
          provenance: mode=max
          outputs: |
            type=image
            name=target
            annotation-index.org.opencontainers.image.description=${{ env.DESCRIPTION }}

  cleanup:
      needs: build-deploy
      runs-on: ubuntu-latest
      permissions:
        packages: write
        contents: read
      steps:
        - name: Delete old container versions
          uses: actions/delete-package-versions@v5
          with:
            # Utilizza il nome della repository corrente in automatico
            package-name: ${{ github.event.repository.name }}
            package-type: 'container'
            # Mantiene le ultime 3 versioni
            min-versions-to-keep: 3
            # Protegge il tag 'latest'
            ignore-versions: 'latest'
            # Nota: Il token viene cercato automaticamente dall'action, 
            # ma se necessario puoi specificarlo con:
            # token: ${{ secrets.GITHUB_TOKEN }}
